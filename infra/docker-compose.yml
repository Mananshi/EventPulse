# A named network so every service can talk to each other by hostname.
# E.g. the kafka service is reachable at "kafka:9092" from inside any container.
networks:
  eventpulse-net:
    driver: bridge

# Named volume so Postgres data survives container restarts.
# Without this, every `docker-compose down` would wipe the database.
volumes:
  postgres-data:
  grafana-data:

services:

  # ─── ZOOKEEPER ────────────────────────────────────────────────────────────
  # Kafka (pre-KRaft) requires Zookeeper to coordinate the broker cluster.
  # It tracks: which brokers are alive, who is the leader for each partition,
  # and stores topic/partition metadata. Think of it as Kafka's registry.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - eventpulse-net
    environment:
      # The port Kafka (and other clients) use to talk to Zookeeper.
      ZOOKEEPER_CLIENT_PORT: 2181
      # How often Zookeeper sends heartbeat ticks (in milliseconds).
      ZOOKEEPER_TICK_TIME: 2000

  # ─── KAFKA ────────────────────────────────────────────────────────────────
  # The heart of EventPulse. Kafka is a distributed log — producers write
  # messages into topics, consumers read from those topics independently.
  # Kafka stores messages durably on disk so slow consumers don't lose data.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - eventpulse-net
    depends_on:
      - zookeeper  # Kafka must wait for Zookeeper to be ready first.
    ports:
      # Expose Kafka to your laptop (outside Docker) on port 9092.
      # Format: "host_port:container_port"
      - "9092:9092"
    environment:
      # Tell Kafka where Zookeeper lives. Uses the service name "zookeeper"
      # as the hostname -- Docker's internal DNS resolves it automatically.
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # LISTENER CONFIGURATION -- this is the trickiest part of Kafka setup.
      # Kafka needs two different addresses depending on who is connecting:
      #   INTERNAL: used by other containers (worker, api) inside Docker
      #   EXTERNAL: used by your laptop's CLI tools or local apps
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      # Brokers talk to each other using the INTERNAL listener.
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # With only 1 broker, replication factor must be 1.
      # In production you'd have 3+ brokers and replication factor 3.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # How long Kafka keeps messages before deleting them (7 days).
      # This is what allows consumers to "replay" past events.
      KAFKA_LOG_RETENTION_HOURS: 168

  # ─── POSTGRESQL ───────────────────────────────────────────────────────────
  # Relational database where the worker persists processed events permanently.
  # Kafka is temporary storage (limited by retention); Postgres is the source
  # of truth for long-term queries, analytics, and the dashboard's history.
  postgres:
    image: postgres:15
    container_name: postgres
    networks:
      - eventpulse-net
    ports:
      # Mapped to 5433 on the host to avoid conflict with a local Postgres installation.
      # Connect from your laptop using: psql -p 5433 -U eventpulse -d eventpulsedb
      - "5433:5432"
    environment:
      POSTGRES_USER: eventpulse
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: eventpulsedb
    volumes:
      # Mount the named volume to persist data across restarts.
      - postgres-data:/var/lib/postgresql/data
      # Postgres runs any .sql files in this folder automatically on first start.
      # This is how we create the events table without manual migration steps.
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ─── REDIS ────────────────────────────────────────────────────────────────
  # In-memory key-value store. We use it for idempotency: before publishing
  # an event to Kafka, the API checks Redis to see if we've already seen
  # this event ID. If yes, we reject the duplicate immediately (very fast).
  # Redis is also used for pub/sub and caching in more advanced setups.
  redis:
    image: redis:7
    container_name: redis
    networks:
      - eventpulse-net
    ports:
      - "6379:6379"
    # --save "": disable RDB snapshots for dev (faster, no disk writes).
    # --loglevel warning: reduce noise in logs.
    command: redis-server --save "" --loglevel warning

  # ─── API ──────────────────────────────────────────────────────────────────
  # Ingestion HTTP server + WebSocket broadcaster.
  # build.context points to the api/ folder relative to this docker-compose.yml.
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: api
    networks:
      - eventpulse-net
    ports:
      - "8080:8080"   # HTTP
      - "3001:3001"   # WebSocket
    env_file:
      - ../api/.env
    environment:
      # Inside Docker, services talk to each other by service name.
      # Override the localhost values from .env to use container hostnames.
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      - kafka
      - redis

  # ─── WORKER ───────────────────────────────────────────────────────────────
  # Kafka consumer that persists events to Postgres.
  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    container_name: worker
    networks:
      - eventpulse-net
    ports:
      - "3002:3002"   # Prometheus metrics
    env_file:
      - ../worker/.env
    environment:
      KAFKA_BROKERS: kafka:29092
      PG_HOST: postgres
      PG_PORT: 5432   # inside Docker, postgres is on its native port
    depends_on:
      - kafka
      - postgres

  # ─── DASHBOARD ────────────────────────────────────────────────────────────
  # React app served by Nginx. Nginx also proxies /api and /ws to the api container.
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    networks:
      - eventpulse-net
    ports:
      - "80:80"
    depends_on:
      - api

  # ─── PROMETHEUS ───────────────────────────────────────────────────────────
  # Scrapes /metrics from the api (8080) and worker (3002) every 15s.
  # Stores everything as time-series data for querying and alerting.
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - eventpulse-net
    ports:
      - "9090:9090"
    volumes:
      # Mount our config so Prometheus knows which targets to scrape.
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    # Pass the config file path explicitly.
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    extra_hosts:
      # Lets containers resolve "host.docker.internal" to the host machine.
      # Required on Linux -- Mac Docker Desktop adds this automatically.
      - "host.docker.internal:host-gateway"

  # ─── GRAFANA ──────────────────────────────────────────────────────────────
  # Visualization layer on top of Prometheus.
  # Connect it to Prometheus as a data source, then build dashboards.
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - eventpulse-net
    ports:
      - "3030:3000"
    volumes:
      # Persist dashboards and data source config across restarts.
      - grafana-data:/var/lib/grafana
    environment:
      # Default admin credentials -- change in production.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
