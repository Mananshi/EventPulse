server {
    listen 80;

    # Serve the React build output.
    root /usr/share/nginx/html;
    index index.html;

    # For any route the browser requests (e.g. /dashboard, /events),
    # serve index.html and let React Router handle it client-side.
    # Without this, a hard refresh on /dashboard returns 404 from Nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* requests to the API service so the browser never
    # needs to know the API's host or port -- it just talks to Nginx.
    # In production, replace "api" with your API's hostname or load balancer.
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket connections to the API's WS server.
    # The Upgrade and Connection headers are required for the WS handshake.
    location /ws {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
